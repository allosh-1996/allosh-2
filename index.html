<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;font-family:'Tajawal',sans-serif;background:#0a0a1a;color:#e2e8f0}
:root{
  --bg:#0d0000;--s1:#1a0505;--s2:#200808;
  --border:rgba(255,255,255,0.08);
  --accent:#dc2626;--muted:rgba(255,255,255,0.35);--r:10px
}
/* BG */
body::before{content:'';position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse 80% 60% at 50% 50%,#3b0000,#0d0000 60%,#000);pointer-events:none}
body::after{content:'Allosh';position:fixed;top:45%;left:50%;transform:translate(-50%,-50%) rotate(-25deg);z-index:0;font-family:'Dancing Script',cursive;font-size:min(28vw,220px);font-weight:700;color:transparent;-webkit-text-stroke:1px rgba(255,255,255,0.13);pointer-events:none;user-select:none;white-space:nowrap;filter:blur(0.5px)}

.orbs{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
.orbs span{position:absolute;border-radius:50%;filter:blur(80px);opacity:.12;animation:fl 12s ease-in-out infinite}
.orbs span:nth-child(1){width:400px;height:400px;background:#dc2626;top:-100px;right:-100px}
.orbs span:nth-child(2){width:300px;height:300px;background:#e5e7eb;bottom:-80px;left:-80px;animation-delay:-4s}
.orbs span:nth-child(3){width:250px;height:250px;background:#991b1b;top:40%;left:30%;animation-delay:-8s}
@keyframes fl{0%,100%{transform:translateY(0)}50%{transform:translateY(-30px)}}

/* LOGIN */
#login{position:fixed;inset:0;z-index:999;display:flex;align-items:center;justify-content:center;background:transparent}
.lbox{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);border-radius:18px;padding:44px 36px 36px;width:90%;max-width:360px;display:flex;flex-direction:column;align-items:center;gap:20px}
.llogo{font-family:'Dancing Script',cursive;font-size:64px;color:#fff;line-height:1;filter:drop-shadow(0 0 16px rgba(255,255,255,0.2))}
.ltag{font-size:10px;font-weight:600;color:rgba(255,255,255,0.3);letter-spacing:2px;text-transform:uppercase;margin-top:-12px}
.lfields{width:100%;display:flex;flex-direction:column;gap:12px}
.lfields label{display:block;font-size:12px;font-weight:700;color:var(--muted);margin-bottom:5px}
.lfields input{width:100%;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:8px;padding:11px 14px;font-size:14px;font-family:'Tajawal',sans-serif;color:#fff;outline:none;transition:border-color .15s}
.lfields input:focus{border-color:var(--accent)}
.lerr{font-size:13px;color:#f87171;text-align:center;min-height:18px;font-weight:600}
.lbtn{width:100%;background:linear-gradient(135deg,#991b1b,#dc2626);color:#fff;border:none;border-radius:9px;padding:13px;font-size:15px;font-family:'Tajawal',sans-serif;font-weight:800;cursor:pointer;transition:opacity .15s}
.lbtn:hover{opacity:.88}
.lbtn:disabled{opacity:.5;cursor:not-allowed}

/* APP */
#app{display:none;position:fixed;inset:0;flex-direction:column;background:transparent;z-index:1}
#app.on{display:flex}

/* HEADER */
.hdr{height:56px;background:rgba(10,0,0,0.9);backdrop-filter:blur(10px);flex-shrink:0;display:flex;align-items:center;justify-content:space-between;padding:0 14px;border-bottom:1px solid rgba(255,255,255,0.07)}
.hlogo{font-family:'Dancing Script',cursive;font-size:32px;color:#fff;line-height:1}
.htag{font-size:8px;font-weight:600;color:rgba(255,255,255,0.3);letter-spacing:1.5px;text-transform:uppercase}
.hbtns{display:flex;gap:8px;align-items:center}

<script>
// ══════════════════════════════════════
//  STATE
// ══════════════════════════════════════
let DB = { devices: [] };
let ME = null;
let TOKEN = localStorage.getItem('_at') || '';
let selDev = null, selSite = null, selGame = null;
let openDevs = new Set(), openSites = new Set();
let editTaskId = null;
let promptCB = null;
let addOpen = false;
let saveTimer = null;

const SC = {
  pending:     { color: '#fbbf24', label: 'Pending',     e: '🟡' },
  credited:    { color: '#4ade80', label: 'Credited',    e: '🟢' },
  notcredited: { color: '#e11d48', label: 'Not Credited',e: '🔴' },
  rejected:    { color: '#94a3b8', label: 'Rejected',    e: '❌' },
};


// ══════════════════════════════════════
//  GAME CATALOG
// ══════════════════════════════════════
const GAME_CATALOG = [
  {
    name: 'Disney Solitaire',
    type: 'mp',
    tasks: ['1','2','3','4','6','8','10','12','15','20']
  },
  {
    name: 'Coin Master',
    type: 'mp',
    tasks: ['3','10','20','40','80','120','160','200','230','260']
  },
  {
    name: 'Screw Guru',
    type: 'af',
    bundle: 'com.disassembly.ios.master',
    tasks: ['5','10','20','50','70','100','150','200','300']
  }
];
// ══════════════════════════════════════
//  API
// ══════════════════════════════════════
async function api(method, path, data) {
  const opts = { method, headers: { 'Content-Type': 'application/json' } };
  if (TOKEN) opts.headers['Authorization'] = 'Bearer ' + TOKEN;
  if (data !== undefined) opts.body = JSON.stringify(data);
  const r = await fetch(path, opts);
  return r.json();
}

async function loadDB() {
  const d = await api('GET', '/api/data');
  DB = (d && Array.isArray(d.devices)) ? d : { devices: [] };
}

function saveDB() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => api('POST', '/api/data', DB), 500);
}

function uid() { return Math.random().toString(36).slice(2, 9); }

// ══════════════════════════════════════
//  AUTH
// ══════════════════════════════════════
async function doLogin() {
  const u = document.getElementById('lu').value.trim();
  const p = document.getElementById('lp').value;
  const btn = document.getElementById('lbtn');
  const err = document.getElementById('lerr');
  err.textContent = '';
  btn.textContent = '...'; btn.disabled = true;
  try {
    const r = await api('POST', '/api/login', { username: u, password: p });
    if (r.error) {
      err.textContent = r.error;
      document.getElementById('lp').value = '';
      btn.textContent = 'Login →'; btn.disabled = false;
      return;
    }
    TOKEN = r.token;
    ME = { username: r.username, role: r.role };
    try { localStorage.setItem('_at', TOKEN); localStorage.setItem('_me', JSON.stringify(ME)); } catch(e) {}
    await loadDB();
    showApp();
  } catch(e) {
    err.textContent = 'Connection error';
    btn.textContent = 'Login →'; btn.disabled = false;
  }
}

async function doLogout() {
  try { await api('POST', '/api/logout'); } catch(e) {}
  TOKEN = ''; ME = null; DB = { devices: [] };
  try { localStorage.removeItem('_at'); localStorage.removeItem('_me'); } catch(e) {}
  document.getElementById('login').style.display = 'flex';
  document.getElementById('app').classList.remove('on');
  document.getElementById('lu').value = '';
  document.getElementById('lp').value = '';
  closeAdmin();
}

// Auto-login on load
(async () => {
  try {
    const r = await api('GET', '/api/me');
    if (r.error) { TOKEN = ''; try { localStorage.removeItem('_at'); } catch(e) {} return; }
    ME = { username: r.username, role: r.role };
    try { localStorage.setItem('_me', JSON.stringify(ME)); } catch(e) {}
    await loadDB();
    showApp();
  } catch(e) { TOKEN = ''; }
})();

function showApp() {
  document.getElementById('login').style.display = 'none';
  document.getElementById('app').classList.add('on');
  selDev = null; selSite = null; selGame = null;
  openDevs = new Set(); openSites = new Set();
  render();
}

// ══════════════════════════════════════
//  SIDEBAR
// ══════════════════════════════════════
function toggleSB() { document.getElementById('sb').classList.toggle('closed'); }

function renderTree() {
  const tree = document.getElementById('sb-tree');
  if (!DB.devices.length) {
    tree.innerHTML = '<div style="padding:20px;text-align:center;color:var(--muted);font-size:13px;">No devices yet</div>';
    return;
  }
  tree.innerHTML = DB.devices.map(dev => {
    const dOpen = openDevs.has(dev.id);
    let inner = '';
    if (dOpen) {
      const sitesHTML = (dev.sites || []).map(site => {
        const sOpen = openSites.has(site.id);
        let gamesHTML = '';
        if (sOpen) {
          const rows = (site.games || []).map(g => {
            const active = selGame === g.id ? 'sel' : '';
            return `<div class="game-row ${active}" data-action="game" data-dev="${dev.id}" data-site="${site.id}" data-game="${g.id}">
              <span class="game-lbl">🎮 ${esc(g.name)}</span>
              <div style="display:flex;gap:3px">
                <button class="id-btn" data-action="open-game-uid" data-dev="${dev.id}" data-site="${site.id}" data-game="${g.id}">🪪</button>
                <button class="del-sm" data-action="del-game" data-dev="${dev.id}" data-site="${site.id}" data-game="${g.id}">🗑️</button>
              </div>
            </div>`;
          }).join('');
          gamesHTML = `<div class="games-wrap">
            ${rows}
            <button class="add-row-btn" data-action="add-game" data-dev="${dev.id}" data-site="${site.id}">＋ Add Game</button>
          </div>`;
        }
        const sActive = selSite === site.id ? 'sel' : '';
        return `<div>
          <div class="site-row ${sActive}" data-action="toggle-site" data-dev="${dev.id}" data-site="${site.id}">
            <span class="site-lbl"><span class="arr ${sOpen?'open':''}">▶</span> 🌐 ${esc(site.name)}</span>
            <button class="ibtn" data-action="del-site" data-dev="${dev.id}" data-site="${site.id}" style="color:#f87171">🗑️</button>
          </div>${gamesHTML}
        </div>`;
      }).join('');
      inner = `<div class="site-wrap">
        ${sitesHTML}
        <button class="add-row-btn add-site-btn" data-action="add-site" data-dev="${dev.id}">＋ Add Site</button>
      </div>`;
    }
    const dActive = selDev === dev.id ? 'sel' : '';
    const hasAdid = !!(dev.ids?.idfa);
    return `<div>
      <div class="dev-row ${dActive}" data-action="toggle-dev" data-dev="${dev.id}">
        <span class="dev-lbl"><span class="arr ${dOpen?'open':''}">▶</span> 📱 ${esc(dev.name)}</span>
        <div style="display:flex;gap:5px;align-items:center">
          <button class="id-btn ${hasAdid?'saved':''}" data-action="open-dev-ids" data-dev="${dev.id}">🪪</button>
          <button class="del-btn" data-action="del-dev" data-dev="${dev.id}">🗑️</button>
        </div>
      </div>${inner}
    </div>`;
  }).join('');
}

// Single event listener — no inline onclick
document.getElementById('sb-tree').addEventListener('click', function(e) {
  const el = e.target.closest('[data-action]');
  if (!el) return;
  e.stopPropagation();
  const a = el.dataset.action;
  const dev = el.dataset.dev, site = el.dataset.site, game = el.dataset.game;

  if (a === 'open-dev-ids') {
    openDevIds(dev);
  } else if (a === 'open-game-uid') {
    openGameUid(dev, site, game);
  } else if (a === 'toggle-dev') {
    if (openDevs.has(dev)) { openDevs.delete(dev); if (selDev===dev){selDev=null;selSite=null;selGame=null;} }
    else { openDevs.add(dev); selDev = dev; }
    render();
  } else if (a === 'toggle-site') {
    if (openSites.has(site)) { openSites.delete(site); if (selSite===site){selSite=null;selGame=null;} }
    else { openSites.add(site); selDev=dev; selSite=site; }
    render();
  } else if (a === 'game') {
    selDev=dev; selSite=site; selGame=game;
    document.getElementById('sb').classList.add('closed');
    render();
  } else if (a === 'add-game') {
    openCatalog(dev, site);
  } else if (a === 'add-site') {
    showPrompt('🌐 Site Name', 'e.g. Attapoll...', name => {
      const d = DB.devices.find(x => x.id === dev);
      if (!d) return;
      if (!d.sites) d.sites = [];
      const s = { id: uid(), name, games: [] };
      d.sites.push(s);
      openDevs.add(dev); openSites.add(s.id);
      selDev=dev; selSite=s.id;
      saveDB(); render();
    });
  } else if (a === 'del-game') {
    if (!confirm('Delete game and all tasks?')) return;
    const s = getObj(dev, site);
    if (!s) return;
    s.games = s.games.filter(g => g.id !== game);
    if (selGame===game) { selGame=null; }
    saveDB(); render();
  } else if (a === 'del-site') {
    if (!confirm('Delete site and all games?')) return;
    const d = DB.devices.find(x => x.id === dev);
    if (!d) return;
    d.sites = d.sites.filter(s => s.id !== site);
    if (selSite===site) { selSite=null; selGame=null; }
    openSites.delete(site); saveDB(); render();
  } else if (a === 'del-dev') {
    if (!confirm('Delete device and all content?')) return;
    DB.devices = DB.devices.filter(d => d.id !== dev);
    if (selDev===dev) { selDev=null; selSite=null; selGame=null; }
    openDevs.delete(dev); saveDB(); render();
  }
});

// ══════════════════════════════════════
//  ADD DEVICE
// ══════════════════════════════════════
function showAddDev() {
  document.getElementById('btn-add-dev').style.display = 'none';
  const tree = document.getElementById('sb-tree');
  const f = document.createElement('div');
  f.className = 'ifrm'; f.id = 'dev-form';
  f.innerHTML = `<input id="dev-inp" placeholder="📱 Device name...">
    <div class="ifrm-acts">
      <button class="btn-ghost btn-ghost-sm" onclick="cancelAddDev()">Cancel</button>
      <button class="btn btn-sm" onclick="confirmAddDev()">＋ Add</button>
    </div>`;
  tree.insertBefore(f, tree.firstChild);
  setTimeout(() => document.getElementById('dev-inp')?.focus(), 50);
  document.getElementById('dev-inp').onkeydown = e => {
    if (e.key === 'Enter') confirmAddDev();
    if (e.key === 'Escape') cancelAddDev();
  };
}
function cancelAddDev() {
  document.getElementById('dev-form')?.remove();
  document.getElementById('btn-add-dev').style.display = '';
}
function confirmAddDev() {
  const name = document.getElementById('dev-inp')?.value.trim();
  if (!name) return;
  cancelAddDev();
  const dev = { id: uid(), name, sites: [] };
  DB.devices.push(dev);
  openDevs.add(dev.id); selDev = dev.id;
  saveDB(); render();
  // Prompt for first site
  showPrompt('🌐 Site Name', 'e.g. Attapoll...', sname => {
    const d = DB.devices.find(x => x.id === dev.id);
    if (!d) return;
    const s = { id: uid(), name: sname, games: [] };
    d.sites.push(s);
    openSites.add(s.id); selSite = s.id;
    saveDB(); render();
  });
}

// ══════════════════════════════════════
//  CONTENT
// ══════════════════════════════════════
function renderContent() {
  const c = document.getElementById('content');
  if (!selDev || !selSite || !selGame) {
    c.innerHTML = '<div class="welcome"><div class="ico">🎮</div><p>Select a game from the sidebar</p><small>Or add a new device</small></div>';
    return;
  }
  const dev  = DB.devices.find(d => d.id === selDev);
  const site = dev?.sites?.find(s => s.id === selSite);
  const game = site?.games?.find(g => g.id === selGame);
  if (!game) {
    selGame = null;
    c.innerHTML = '<div class="welcome"><div class="ico">🎮</div><p>Select a game from the sidebar</p><small>Or add a new device</small></div>';
    return;
  }

  const fStatus = document.getElementById('f-status')?.value || '';
  const allTasks = game.tasks || [];
  const tasks = fStatus ? allTasks.filter(t => t.status === fStatus) : allTasks;

  const statusOpts = [['', 'All'], ...Object.entries(SC).map(([v, s]) => [v, s.e + ' ' + s.label])]
    .map(([v, l]) => `<option value="${v}"${fStatus===v?' selected':''}>${l}</option>`).join('');

  const taskRows = tasks.length === 0
    ? `<tr><td colspan="5" style="text-align:center;padding:28px;color:var(--muted);">${allTasks.length===0?'No tasks yet — add some above!':'No tasks match filter'}</td></tr>`
    : tasks.map((t, i) => `<tr>
        <td style="color:var(--muted);font-size:11px;">${i+1}</td>
        <td style="font-weight:700;color:${SC[t.status]?.color||'#e2e8f0'}">${esc(t.name)}</td>
        <td>
          <div class="sdrop">
            <span class="dot" style="background:${SC[t.status]?.color||'#94a3b8'}" data-action="open-status" data-tid="${t.id}"></span>
            <div class="smenu" id="sm-${t.id}">
              <div class="sopt" data-action="run-task" data-tid="${t.id}" data-tname="${esc(t.name)}" style="color:#818cf8">
                ${(t.status==='credited'||t.status==='notcredited') ? '▶ Replay' : '▶ Run'}
              </div>
            </div>
          </div>
        </td>
        <td style="font-size:12px;color:var(--muted);max-width:90px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(t.notes||'—')}</td>
        <td>
          <div style="display:flex;gap:3px">
            <button class="ibtn" data-action="edit-task" data-tid="${t.id}">✏️</button>
            <button class="ibtn" data-action="del-task" data-tid="${t.id}" style="color:#f87171">🗑️</button>
          </div>
        </td>
      </tr>`).join('');

  c.innerHTML = `
    <div class="bc">
      <b>📱 ${esc(dev.name)}</b><span>›</span>
      <b class="bs">🌐 ${esc(site.name)}</b><span>›</span>
      <b>🎮 ${esc(game.name)}</b>
      <span style="margin-left:auto;font-size:12px;color:var(--muted)">${allTasks.length===0?'No tasks':`${tasks.length}/${allTasks.length}`}</span>
    </div>
    <div class="filters">
      <span style="font-size:12px;font-weight:700;color:var(--muted)">📊</span>
      <select class="fsel" id="f-status" onchange="renderContent()">${statusOpts}</select>
      <button class="btn-ghost" style="padding:5px 10px;font-size:12px" onclick="document.getElementById('f-status').value='';renderContent()">↺</button>
    </div>
    <div class="add-card">
      <div class="add-head" id="add-head">
        <span class="add-head-title">＋ Add Tasks</span>
        <span id="add-arrow" style="color:var(--muted);font-size:11px;transition:transform .2s">▼</span>
      </div>
      <div class="add-body ${addOpen?'open':''}" id="add-body">
        <div>
          <label style="display:block;font-size:11px;font-weight:700;color:var(--muted);margin-bottom:6px">📝 Task Names <span style="font-weight:400;opacity:.7">(one per line)</span></label>
          <textarea id="task-names" placeholder="Level 1&#10;Level 2&#10;Level 5"></textarea>
        </div>
        <div style="display:flex;gap:8px;justify-content:flex-end">
          <button class="btn-ghost" id="add-cancel">Cancel</button>
          <button class="btn" id="add-confirm">➕ Add All</button>
        </div>
      </div>
    </div>
    <div class="tbl-wrap">
      <table>
        <thead><tr><th>#</th><th>Task</th><th>Status</th><th>Notes</th><th></th></tr></thead>
        <tbody>${taskRows}</tbody>
      </table>
    </div>`;

  // Apply arrow state
  if (addOpen) document.getElementById('add-arrow').style.transform = 'rotate(180deg)';

  // Bind add card buttons directly (no inline onclick)
  document.getElementById('add-head').onclick = toggleAdd;
  document.getElementById('add-cancel').onclick = () => { addOpen = false; renderContent(); };
  document.getElementById('add-confirm').onclick = addTasks;

  // Bind content events via delegation
  c.addEventListener('click', contentClick, { once: false });
}

function contentClick(e) {
  const el = e.target.closest('[data-action]');
  if (!el) return;
  const a = el.dataset.action;

  if (a === 'open-status') {
    e.stopPropagation();
    const tid = el.dataset.tid;
    document.querySelectorAll('.smenu').forEach(m => { if (m.id !== 'sm-'+tid) m.classList.remove('open'); });
    document.getElementById('sm-'+tid)?.classList.toggle('open');
  } else if (a === 'set-status') {
    const game = getGame();
    const task = game?.tasks?.find(t => t.id === el.dataset.tid);
    if (task) { task.status = el.dataset.status; saveDB(); renderContent(); }
    document.querySelectorAll('.smenu').forEach(m => m.classList.remove('open'));
  } else if (a === 'run-task') {
    document.querySelectorAll('.smenu').forEach(m => m.classList.remove('open'));
    runTask(el.dataset.tid, el.dataset.tname);
  } else if (a === 'edit-task') {
    openEdit(el.dataset.tid);
  } else if (a === 'del-task') {
    if (!confirm('Delete this task?')) return;
    const game = getGame();
    if (!game) return;
    game.tasks = game.tasks.filter(t => t.id !== el.dataset.tid);
    saveDB(); renderContent();
  }
}

document.addEventListener('click', () => document.querySelectorAll('.smenu').forEach(m => m.classList.remove('open')));

function toggleAdd() {
  addOpen = !addOpen;
  const body = document.getElementById('add-body');
  const arrow = document.getElementById('add-arrow');
  if (!body) return;
  body.classList.toggle('open', addOpen);
  if (arrow) arrow.style.transform = addOpen ? 'rotate(180deg)' : '';
  if (addOpen) setTimeout(() => document.getElementById('task-names')?.focus(), 50);
}

function addTasks() {
  const names = (document.getElementById('task-names')?.value || '').split('\n').map(s => s.trim()).filter(Boolean);
  if (!names.length) { alert('Add at least one task name'); return; }
  const game = getGame();
  if (!game) return;
  if (!game.tasks) game.tasks = [];
  names.forEach(name => game.tasks.push({ id: uid(), name, status: 'pending', cid: '', sdid: '', install: '', notes: '' }));
  addOpen = false;
  saveDB(); renderContent();
}

// ══════════════════════════════════════
//  EDIT TASK
// ══════════════════════════════════════
function openEdit(tid) {
  const game = getGame();
  const task = game?.tasks?.find(t => t.id === tid);
  if (!task) return;
  editTaskId = tid;
  document.getElementById('e-name').value = task.name;
  const sel = document.getElementById('e-status');
  sel.innerHTML = Object.entries(SC).map(([v,s]) => `<option value="${v}">${s.e} ${s.label}</option>`).join('');
  sel.value = task.status;
  document.getElementById('e-cid').value = task.cid || '';
  document.getElementById('e-sdid').value = task.sdid || '';
  document.getElementById('e-install').value = task.install || '';
  document.getElementById('e-notes').value = task.notes || '';
  document.getElementById('edit-ov').classList.add('open');
}
function saveEdit() {
  const game = getGame();
  const task = game?.tasks?.find(t => t.id === editTaskId);
  if (!task) return;
  task.name    = document.getElementById('e-name').value.trim();
  task.status  = document.getElementById('e-status').value;
  task.cid     = document.getElementById('e-cid').value.trim();
  task.sdid    = document.getElementById('e-sdid').value.trim();
  task.install = document.getElementById('e-install').value.trim();
  task.notes   = document.getElementById('e-notes').value.trim();
  saveDB(); renderContent(); closeEdit();
}
function closeEdit() { document.getElementById('edit-ov').classList.remove('open'); editTaskId = null; }

// ══════════════════════════════════════
//  PROMPT
// ══════════════════════════════════════
function showPrompt(title, placeholder, cb) {
  document.getElementById('prompt-title').textContent = title;
  const inp = document.getElementById('prompt-input');
  inp.placeholder = placeholder; inp.value = '';
  promptCB = cb;
  document.getElementById('prompt-ov').classList.add('open');
  setTimeout(() => inp.focus(), 80);
}
function confirmPrompt() {
  const val = document.getElementById('prompt-input').value.trim();
  if (!val) return;
  closePrompt();
  if (promptCB) { promptCB(val); promptCB = null; }
}
function closePrompt() { document.getElementById('prompt-ov').classList.remove('open'); }

// ══════════════════════════════════════
//  ADMIN
// ══════════════════════════════════════
function openAdmin() {
  if (!ME || ME.role !== 'admin') return;
  loadUsers();
  document.getElementById('admin-ov').classList.add('open');
}
function closeAdmin() { document.getElementById('admin-ov').classList.remove('open'); }
async function loadUsers() {
  const ul = document.getElementById('ulist');
  ul.innerHTML = '<div style="color:var(--muted);font-size:12px;padding:8px">Loading...</div>';
  try {
    const users = await api('GET', '/api/users');
    if (!Array.isArray(users)) { ul.innerHTML = '<div style="color:#f87171;font-size:12px">Error</div>'; return; }
    ul.innerHTML = users.map(u => `<div class="urow">
      <div>
        <div class="uname">👤 ${esc(u.username)} ${u.role==='admin'?'<span style="font-size:10px;color:#818cf8">⚙️</span>':''}</div>
        <div class="urole">${u.devices} devices · ${u.tasks} tasks</div>
      </div>
      <div style="display:flex;gap:6px;align-items:center">
        ${u.username!==ME.username?`<button class="btn btn-sm" onclick="viewAs('${esc(u.username)}')">View</button>`:''}
        ${u.username!=='admin'?`<button class="ibtn" onclick="removeUser('${esc(u.username)}')" style="color:#f87171">🗑️</button>`:'<span style="font-size:11px;color:var(--muted)">Protected</span>'}
      </div>
    </div>`).join('');
  } catch(e) { ul.innerHTML = '<div style="color:#f87171;font-size:12px">Connection error</div>'; }
}
async function addUser() {
  const u = document.getElementById('au').value.trim();
  const p = document.getElementById('ap').value.trim();
  if (!u || !p) { alert('Username and password required'); return; }
  const r = await api('POST', '/api/users', { username: u, password: p });
  if (r.error) { alert(r.error); return; }
  document.getElementById('au').value = '';
  document.getElementById('ap').value = '';
  loadUsers();
}
async function removeUser(username) {
  if (!confirm('Delete user ' + username + '?')) return;
  const r = await api('DELETE', '/api/users/' + encodeURIComponent(username));
  if (r.error) { alert(r.error); return; }
  loadUsers();
}
async function viewAs(username) {
  const d = await api('GET', '/api/data?user=' + encodeURIComponent(username));
  DB = (d && Array.isArray(d.devices)) ? d : { devices: [] };
  selDev=null; selSite=null; selGame=null;
  openDevs=new Set(); openSites=new Set();
  closeAdmin(); render();
  document.getElementById('banner-text').textContent = '👁️ Viewing: ' + username;
  document.getElementById('admin-banner').style.display = 'flex';
}
async function exitView() {
  await loadDB();
  selDev=null; selSite=null; selGame=null;
  openDevs=new Set(); openSites=new Set();
  document.getElementById('admin-banner').style.display = 'none';
  render();
}

// ══════════════════════════════════════
//  HELPERS
// ══════════════════════════════════════
function getGame() {
  return DB.devices.find(d=>d.id===selDev)?.sites?.find(s=>s.id===selSite)?.games?.find(g=>g.id===selGame);
}
function getObj(devId, siteId) {
  return DB.devices.find(d=>d.id===devId)?.sites?.find(s=>s.id===siteId);
}
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function render() { renderTree(); renderContent(); }

// ══════════════════════════════════════
//  PWA
// ══════════════════════════════════════
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => navigator.serviceWorker.register('/sw.js').catch(()=>{}));
}

let deferredPrompt = null;

window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
});

window.addEventListener('appinstalled', () => {
  deferredPrompt = null;
});

function installApp() {
  if (deferredPrompt) {
    deferredPrompt.prompt();
    deferredPrompt.userChoice.then(choice => {
      deferredPrompt = null;
      if (choice.outcome === 'accepted') {
        document.getElementById('btn-install').style.animation = 'none';
        document.getElementById('btn-install').textContent = '✅ تم التنزيل';
      }
    });
  } else {
    const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
    if (isIOS) {
      alert('📲 iOS:\nاضغط زر المشاركة Share ثم\n"Add to Home Screen" ← إضافة للشاشة الرئيسية');
    } else {
      alert('📲 Android / Chrome:\nاضغط ⋮ (القائمة) ثم\n"Add to Home Screen" ← إضافة للشاشة الرئيسية');
    }
  }
}


// ── Run Task → dispatch to MP or AF ──
async function runTask(taskId, taskName) {
  const game = getGame();
  if (!game) return;

  const gameType = game.type || 'mp';
  const level = parseInt(taskName);
  const levelNum = isNaN(level) ? taskName : level;

  // Show sending indicator
  const dot = document.querySelector(`[data-action="open-status"][data-tid="${taskId}"]`);
  if (dot) { dot.style.opacity = '0.4'; dot.style.transform = 'scale(0.8)'; }

  let status = false;

  if (gameType === 'af') {
    // AppsFlyer flow
    const dev = DB.devices.find(d => d.id === selDev);
    const ids = dev?.ids || {};
    const idfa = ids.idfa || '';
    const afId = game.afId || '';
    const devKey = game.devKey || '';
    const bundle = game.bundle || '';

    if (!idfa || !afId || !devKey || !bundle) {
      if (dot) { dot.style.opacity = ''; dot.style.transform = ''; }
      alert('⚠️ ناقص معلومات AppsFlyer!\nاضغط 🪪 جنب اللعبة وحط:\n- AppsFlyer ID\n- Dev Key\n- IDFA بالجهاز');
      return;
    }
    status = await sendAFEvent(levelNum, idfa, afId, devKey, bundle, ids);
  } else {
    // Mixpanel flow
    const mpUid = game.uid || '';
    if (!mpUid) {
      if (dot) { dot.style.opacity = ''; dot.style.transform = ''; }
      alert('⚠️ ما في Mixpanel ID محفوظ لهاللعبة!\nاضغط 🪪 جنب اللعبة وحط الـ distinct_id أول.');
      return;
    }
    status = await sendMPEvent('level_complete', levelNum, mpUid);
  }

  if (dot) { dot.style.opacity = ''; dot.style.transform = ''; }

  const task = game.tasks.find(t => t.id === taskId);
  if (status === 200 || status === true) {
    if (task) { task.status = 'credited'; saveDB(); renderContent(); }
  } else {
    if (task) { task.status = 'notcredited'; saveDB(); renderContent(); }
  }
}

let _curDevId = null, _curGameId = null;

// Device IDs modal
function openDevIds(devId) {
  _curDevId = devId;
  const dev = DB.devices.find(d => d.id === devId);
  const d = dev?.ids || {};
  document.getElementById('di-idfa').value   = d.idfa   || '';
  document.getElementById('di-idfv').value   = d.idfv   || '';
  document.getElementById('di-iosver').value = d.iosver || '';
  document.getElementById('dev-ids-ov').classList.add('open');
  setTimeout(()=>document.getElementById('di-idfa').focus(),80);
}
function closeDevIds() { document.getElementById('dev-ids-ov').classList.remove('open'); }
function saveDevIds() {
  const idfa = document.getElementById('di-idfa').value.trim();
  if (!idfa) { alert('IDFA مطلوب'); return; }
  const dev = DB.devices.find(d => d.id === _curDevId);
  if (!dev) return;
  dev.ids = {
    idfa,
    idfv:   document.getElementById('di-idfv').value.trim(),
    iosver: document.getElementById('di-iosver').value.trim()
  };
  saveDB();
  closeDevIds();
  render();
}

// Game UID modal — handles both MP and AF
function openGameUid(devId, siteId, gameId) {
  _curGameId = gameId;
  const game = DB.devices.find(d=>d.id===devId)?.sites?.find(s=>s.id===siteId)?.games?.find(g=>g.id===gameId);
  const gameType = game?.type || 'mp';

  if (gameType === 'af') {
    // Show AF modal
    document.getElementById('gaf-afid').value   = game?.afId   || '';
    document.getElementById('gaf-devkey').value = game?.devKey || '';
    document.getElementById('game-af-ov').classList.add('open');
    setTimeout(()=>document.getElementById('gaf-afid').focus(),80);
  } else {
    // Show MP modal
    document.getElementById('gu-uid').value = game?.uid || '';
    document.getElementById('game-uid-ov').classList.add('open');
    setTimeout(()=>document.getElementById('gu-uid').focus(),80);
  }
}
function closeGameUid() {
  document.getElementById('game-uid-ov').classList.remove('open');
  document.getElementById('game-af-ov').classList.remove('open');
}
function saveGameUid() {
  const uid = document.getElementById('gu-uid').value.trim();
  if (!uid) { alert('UID مطلوب'); return; }
  DB.devices.forEach(dev => dev.sites?.forEach(site => site.games?.forEach(game => {
    if (game.id === _curGameId) game.uid = uid;
  })));
  saveDB();
  closeGameUid();
}
function saveGameAF() {
  const afId   = document.getElementById('gaf-afid').value.trim();
  const devKey = document.getElementById('gaf-devkey').value.trim();
  if (!afId || !devKey) { alert('AppsFlyer ID و Dev Key مطلوبين'); return; }
  DB.devices.forEach(dev => dev.sites?.forEach(site => site.games?.forEach(game => {
    if (game.id === _curGameId) { game.afId = afId; game.devKey = devKey; }
  })));
  saveDB();
  closeGameUid();
  render();
}

    </div>
  `).join('');
  document.getElementById('catalog-ov').classList.add('open');
}

function closeCatalog() {
  document.getElementById('catalog-ov').classList.remove('open');
}

function addGameFromCatalog(idx) {
  const g = GAME_CATALOG[idx];
  const dev = DB.devices.find(d => d.id === _catalogDevId);
  const site = dev?.sites?.find(s => s.id === _catalogSiteId);
  if (!site) return;
  if (!site.games) site.games = [];
  const newGame = {
    id: uid(),
    name: g.name,
    type: g.type || 'mp',
    bundle: g.bundle || '',
    tasks: g.tasks.map(name => ({ id: uid(), name, status: 'pending', cid: '', sdid: '', install: '', notes: '' }))
  };
  site.games.push(newGame);
  openDevs.add(_catalogDevId);
  openSites.add(_catalogSiteId);
  selDev = _catalogDevId;
  selSite = _catalogSiteId;
  selGame = newGame.id;
  saveDB();
  closeCatalog();
  render();
}
